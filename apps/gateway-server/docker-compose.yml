version: "3.8"

services:
  gateway:
    build:
      context: ../..
      dockerfile: apps/gateway-server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - GATEWAY_PARTY_ID=${GATEWAY_PARTY_ID}
      - GATEWAY_NETWORK=${GATEWAY_NETWORK:-testnet}
      - CANTON_LEDGER_URL=${CANTON_LEDGER_URL:-http://localhost:7575}
      - CANTON_JWT=${CANTON_JWT}
      # API Keys for upstream services
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FAL_API_KEY=${FAL_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
      - RELOADLY_API_KEY=${RELOADLY_API_KEY}
      - LOB_API_KEY=${LOB_API_KEY}
    restart: unless-stopped
